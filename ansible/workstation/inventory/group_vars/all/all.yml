# 노드 공통 변수
# @Ref https://github.com/kubernetes-sigs/kubespray/blob/master/inventory/sample/group_vars/all/all.yml

ansible_connection: paramiko
ansible_user: "{{ lookup('env', 'WORKSTATION_BOOTSTRAP_USERNAME') }}"
ansible_ssh_pass: "{{ lookup('env', 'WORKSTATION_BOOTSTRAP_SSH_PRIVATE_KEY_PASSPHRASE') }}"
ansible_ssh_private_key_file: "{{ lookup('env', 'WORKSTATION_SSH_PRIVATE_KEY_FILE_ABSOLUTE_PATH') }}"
ansible_become_password: "{{ lookup('env', 'WORKSTATION_BOOTSTRAP_PASSWORD') }}"

ntp_enabled: true
# Ubuntu 24.04+: classic ntp 패키지 없음 → ntpsec (Kubespray docs/advanced/ntp.md)
ntp_package: ntpsec
ntp_timezone: 'Asia/Seoul'
