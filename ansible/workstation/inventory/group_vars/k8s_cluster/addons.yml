# Add-on 컴포넌트
# @Ref https://github.com/kubernetes-sigs/kubespray/blob/master/inventory/sample/group_vars/k8s_cluster/addons.yml

# Kube VIP
kube_vip_enabled: true
kube_vip_address: "{{ lookup('env', 'WORKSTATION_BOOTSTRAP_VIP') }}"
kube_vip_arp_enabled: true
kube_vip_controlplane_enabled: true
loadbalancer_apiserver:
  address: '{{ kube_vip_address }}'
  port: 6443

# Metrics Server deployment
metrics_server_enabled: true
metrics_server_container_port: 10250
metrics_server_kubelet_insecure_tls: true
metrics_server_metric_resolution: 15s
metrics_server_kubelet_preferred_address_types: 'InternalIP,ExternalIP,Hostname'
metrics_server_host_network: false
metrics_server_replicas: 1

# Rancher Local Path Provisioner (Vault Raft 등 — 노드 로컬 디스크, Longhorn과 분리)
local_path_provisioner_enabled: true
local_path_provisioner_storage_class: "{{ lookup('env', 'WORKSTATION_BOOTSTRAP_LOCAL_PATH_STORAGECLASS_NAME') }}"
local_path_provisioner_claim_root: /var/lib/local-path-provisioner
local_path_provisioner_reclaim_policy: Retain
local_path_provisioner_is_default_storageclass: 'false'
